<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Tracker</title>
       <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
   <header class="w-[80%] mx-auto">
      <h1 class="text-6xl font-bold text-green-500">Plant Tracker</h1>
      <div class="grid grid-cols-3 gap-8">

        <div class="bg-amber-200 p-4 rounded-3xl">
           <p>Total</p>
           <p id="total">0</p> 
        </div>

        <div class="bg-green-500 p-4 rounded-3xl">
          <p>Thrive</p>
           <p id="thrivingCount">0</p> 
        </div>

        <div class="bg-red-500 p-4 rounded-3xl">
            <p>Struggling</p>
           <p class="strugglingCount">0</p> 
        </div>
      </div>
   </header>

   <hr class="my-5">
    <main class="w-[80%] mx-auto">
        <div>
            <button class="bg-black px-5 py-2 rounded-md text-white" id="all-filter-btn">All</button>
            <button class="bg-gray-300 px-5 py-2 rounded-md" id="thriving-filter-btn">Thriving</button>
            <button class="bg-gray-300 px-5 py-2 rounded-md" id="struggling-filter-btn">Struggling</button>
        </div>

    </main>
</body>
</html>
